apiVersion: v1
kind: Secret
metadata:
  name: relayhub-env
  namespace: relayhub
type: Opaque
stringData:
  ADMIN_EMAILS: "demo@example.com"
  ADMIN_TOKEN: "replace-with-a-random-admin-token"
  KEY_ENCRYPTION_SECRET: "replace-with-a-stable-random-encryption-secret"
  TAOBAO_APP_KEY: "replace-with-taobao-app-key"
  TAOBAO_APP_SECRET: "replace-with-taobao-app-secret"
  TAOBAO_TMC_GROUP: "replace-with-taobao-tmc-group"
  TAOBAO_REDIRECT_URI: "https://relayhub.chrisley.site/api/taobao/oauth/callback"
  TAOBAO_OAUTH_STATE: "replace-with-a-random-oauth-state"
  TAOBAO_TMC_INTERVAL_MS: "5000"
  TAOBAO_TMC_QUANTITY: "10"
